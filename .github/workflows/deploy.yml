name: Deploy Portfolio

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  plan:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v6

      - uses: asdf-vm/actions/install@v4

      - name: Create R2 bucket for Terraform state
        run: |
          npx wrangler r2 bucket create portfolio-tfstate 2>/dev/null || echo "Bucket exists, continuing..."
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

      - name: tofu init
        run: tofu init
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          TF_VAR_tf_encryption_key: ${{ secrets.TF_ENCRYPTION_KEY }}

      - name: tofu plan
        run: tofu plan -no-color
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_google_dkim_record: ${{ secrets.GOOGLE_DKIM_RECORD }}
          TF_VAR_tf_encryption_key: ${{ secrets.TF_ENCRYPTION_KEY }}

  deploy:
    needs: plan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: asdf-vm/actions/install@v4

      - name: Create R2 bucket for Terraform state
        run: |
          npx wrangler r2 bucket create portfolio-tfstate 2>/dev/null || echo "Bucket exists, continuing..."
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

      - name: tofu init
        working-directory: infra
        run: tofu init
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          TF_VAR_tf_encryption_key: ${{ secrets.TF_ENCRYPTION_KEY }}

      - name: tofu apply
        working-directory: infra
        run: tofu apply -auto-approve
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_google_dkim_record: ${{ secrets.GOOGLE_DKIM_RECORD }}
          TF_VAR_tf_encryption_key: ${{ secrets.TF_ENCRYPTION_KEY }}

      - name: Install wrangler dependencies
        working-directory: site
        run: npm ci

      - name: Deploy worker
        working-directory: site
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
