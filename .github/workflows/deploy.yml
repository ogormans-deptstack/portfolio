name: Deploy Portfolio

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  plan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v6

      - uses: asdf-vm/actions/install@v4

      - name: Check GCP configuration
        id: check
        run: |
          if [ -z "${{ vars.GCP_WIF_PROVIDER }}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::GCP not bootstrapped — skipping plan. Run bootstrap.sh first."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.check.outputs.configured == 'true'
        id: auth
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - if: steps.check.outputs.configured == 'true'
        name: tofu init
        run: tofu init

      - if: steps.check.outputs.configured == 'true'
        name: tofu plan
        run: tofu plan -no-color
        env:
          TF_VAR_gcp_project_id: ${{ vars.GCP_PROJECT_ID }}
          TF_VAR_cloudflare_account_id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: asdf-vm/actions/install@v4

      - name: Check GCP configuration
        id: check
        run: |
          if [ -z "${{ vars.GCP_WIF_PROVIDER }}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::GCP not bootstrapped — skipping infra deploy. Run bootstrap.sh first."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.check.outputs.configured == 'true'
        id: auth
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - if: steps.check.outputs.configured == 'true'
        name: tofu apply
        working-directory: infra
        run: |
          tofu init
          tofu apply -auto-approve
        env:
          TF_VAR_gcp_project_id: ${{ vars.GCP_PROJECT_ID }}
          TF_VAR_cloudflare_account_id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

      - name: Install wrangler
        working-directory: site
        run: npm ci

      - if: steps.check.outputs.configured == 'true'
        name: Deploy worker
        working-directory: site
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
